<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Runner Game</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
            }
        }
    </script>
</head>

<body>
  <div id="ui">
    <div class="hud-card">
      <div class="hud-stats">
        <div class="hud-row char-count">👥 <span>1</span></div>
        <div class="hud-sep"></div>
        <div class="hud-row power-level">🔥 <span>1</span></div>
        <div class="hud-sep"></div>
        <div class="hud-row speed-level">⚡ <span>1</span></div>
        <div class="hud-sep"></div>
        <div class="hud-row jump-level">🟢 <span>1</span></div>
      </div>
      <div class="hud-hint">WASD · Space · Click</div>
    </div>
  </div>
  <div id="gameover-overlay"></div>
  <script type="module" src="game.js"></script>
</body>

</html>
